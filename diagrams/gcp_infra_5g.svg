<svg width="100%" viewBox="0 0 690 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GCP Infrastructure Overview (N2/N3 Highlighted)</title>
  <desc>Two GCP spot VMs connected over an internal VPC network. core-5g runs k3s and free5GC. ueransim runs gNB/UE. GitHub and Cloudflare blocks positioned for clarity. N2/N3 connection highlighted.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(24, 95, 165)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30" y="30" width="620" height="460" rx="16" fill="none" stroke="rgba(31, 30, 29, 0.3)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="52" fill="rgb(61, 61, 58)" font-family="sans-serif" font-size="12px">GCP VPC — us-south1-a</text>

