  <line x1="602" y1="228" x2="640" y2="228" stroke="rgb(115, 114, 108)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="644" y="232" fill="rgb(61, 61, 58)" font-family="sans-serif" font-size="12px">8.8.8.8</text>

