  <rect x="322" y="172" width="40" height="18" rx="4" fill="white" fill-opacity="0.8"/>
  <text x="342" y="186" text-anchor="middle" fill="rgb(12, 68, 124)" font-family="sans-serif" font-size="12px" font-weight="bold">N2/N3</text>

  <line x1="305" y1="232" x2="380" y2="280" stroke="rgb(115, 114, 108)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

